<!DOCTYPE html>

<head>

<title>JR Apostilas | Plataforma SESAU</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#064e3b);
color:white;
}

/* HEADER */
header{
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.5);
position:sticky;
top:0;
}

.logo{
font-size:26px;
font-weight:bold;
color:#22c55e;
}

/* HERO */
.hero{
padding:60px 40px;
background:linear-gradient(90deg,rgba(0,0,0,0.8),transparent),
url('https://images.unsplash.com/photo-1588776814546-ec7e3d6c9e3d') center/cover;
}

.hero h1{
font-size:42px;
max-width:600px;
}

.hero p{
color:#cbd5f5;
}

/* CONTAINER */
.container{
max-width:1200px;
margin:auto;
padding:30px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
margin-bottom:30px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* VIDEO */
.video{
width:100%;
height:300px;
border-radius:15px;
margin-bottom:15px;
}

/* BOTÕES */
.btn{
display:block;
margin:8px 0;
padding:12px;
border-radius:10px;
background:#22c55e;
color:white;
text-align:center;
text-decoration:none;
font-weight:bold;
}

.btn:hover{
background:#16a34a;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

h2{
margin-bottom:10px;
}

</style>
</head>
